<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <rect width="60" height="60" fill="#1d4ed8"/>
  <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- candlestick 1 -->
    <line x1="17" y1="14" x2="17" y2="44" stroke-width="1.4"/>
    <rect x="13" y="22" width="8" height="12" rx="1" stroke-width="2" fill="#1d4ed8"/>
    <!-- candlestick 2 (up / green-ish — white fill) -->
    <line x1="30" y1="12" x2="30" y2="42" stroke-width="1.4"/>
    <rect x="26" y="18" width="8" height="16" rx="1" stroke-width="2" fill="white"/>
    <!-- candlestick 3 -->
    <line x1="43" y1="16" x2="43" y2="44" stroke-width="1.4"/>
    <rect x="39" y="24" width="8" height="10" rx="1" stroke-width="2" fill="#1d4ed8"/>
    <!-- trend line -->
    <polyline points="13,38 26,28 39,32" stroke-width="1.8" stroke-dasharray="2 2"/>
  </g>
</svg>
